<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا آسف يا نورعين ❤️</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            text-align: center;
            padding: 30px;
            margin: 0;
            direction: rtl;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 700px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #ff4d6d;
            font-size: 2.5em;
            margin: 0 0 20px 0;
        }
        #text {
            font-size: 1.2em;
            color: #333;
            line-height: 1.8;
            min-height: 100px;
        }
        button {
            background: #ff4d6d;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover {
            background: #ff1744;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>أنا آسف يا نورعين 💔</h1>
    <div class="box">
        <p id="text"></p>
        <button onclick="goNext()">كملي هنا 💌</button>
    </div>
    <script>
        let msg = "يا نورعين… أنا بجد آسف 😔 ندمان إني زعلتك ومش قادر أكون سبب في حزنك… انتي أغلى حاجة عندي وبحبك بجد 💖";
        let i = 0;
        function typeWriter() {
            if (i < msg.length) {
                document.getElementById("text").innerHTML += msg.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        typeWriter();
        function goNext() {
            window.location.href = "page2.html";
        }
    </script>
</body>
</html>
